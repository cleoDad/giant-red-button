<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Boss Button</title>
    <style>
      :root { color-scheme: light; }
      html, body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(circle at top, #fff8f8, #ffe3e3 50%, #ffd0d0);
        overflow: hidden;
      }
      body {
        display: grid;
        place-items: center;
        padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
        box-sizing: border-box;
      }
      .app {
        width: 100%;
        max-width: 560px;
        text-align: center;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.8rem, 7vw, 3rem);
        color: #7c0000;
        letter-spacing: 0.02em;
        transition: transform 260ms ease, opacity 260ms ease;
      }
      .sub {
        margin: 0 0 18px;
        font-size: clamp(1rem, 3.5vw, 1.1rem);
        color: #8f4a4a;
      }
      .hud {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 0.95rem;
        color: #6d2b2b;
        margin: 0 4px 12px;
      }
      .bar {
        height: 18px;
        border-radius: 999px;
        background: rgba(255,255,255,0.65);
        box-shadow: inset 0 0 0 1px rgba(122,0,0,0.12);
        overflow: hidden;
        margin-bottom: 18px;
      }
      .fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #ff8d8d, #ff3a3a, #b50000);
        transition: width 260ms ease;
      }
      .button-wrap {
        display: grid;
        place-items: center;
        min-height: 52vh;
      }
      button {
        width: min(84vw, 340px);
        aspect-ratio: 1 / 1;
        border: none;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 28%, #ff9b9b 0%, #ff3a3a 28%, #dc0000 58%, #990000 100%);
        color: white;
        font-size: clamp(1.6rem, 5vw, 2.15rem);
        font-weight: 900;
        letter-spacing: 0.08em;
        box-shadow:
          0 18px 42px rgba(177, 0, 0, 0.38),
          inset 0 10px 18px rgba(255, 255, 255, 0.28),
          inset 0 -14px 22px rgba(0, 0, 0, 0.22);
        touch-action: manipulation;
        cursor: pointer;
        transform: translateZ(0);
        transition: transform 120ms ease, box-shadow 220ms ease, filter 220ms ease;
      }
      button:hover { filter: brightness(1.03); }
      button:active { transform: scale(0.965); }
      .message {
        margin-top: 18px;
        min-height: 3.5rem;
        font-size: clamp(1.45rem, 5vw, 2.2rem);
        font-weight: 800;
        color: #0b6b1d;
        opacity: 0;
        transform: translateY(16px) scale(0.96);
        transition: opacity 280ms ease, transform 280ms ease;
      }
      .message.show {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      .title-hide {
        opacity: 0;
        transform: translateY(-8px);
      }
      .pulse { animation: pulse 650ms ease-out; }
      .pop { animation: pop 420ms cubic-bezier(.2, .9, .2, 1.3); }
      .shake { animation: shake 180ms linear 2; }
      .shake-hard { animation: shake-hard 120ms linear 6; }
      .victory { animation: victory 900ms ease both; }
      .danger { color: #b30000; }
      @keyframes pulse {
        0% { transform: scale(1); }
        45% { transform: scale(1.06); }
        100% { transform: scale(1); }
      }
      @keyframes pop {
        0% { transform: translateY(16px) scale(0.88); }
        70% { transform: translateY(-2px) scale(1.03); }
        100% { transform: translateY(0) scale(1); }
      }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-3px); }
        75% { transform: translateX(3px); }
      }
      @keyframes shake-hard {
        0%, 100% { transform: translateX(0) rotate(0deg); }
        25% { transform: translateX(-5px) rotate(-1deg); }
        50% { transform: translateX(5px) rotate(1deg); }
        75% { transform: translateX(-4px) rotate(-1deg); }
      }
      @keyframes victory {
        0% { transform: scale(0.96); opacity: 0.3; }
        40% { transform: scale(1.02); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <main class="app" role="application" aria-label="Boss button mini game">
      <h1 id="title">BOSS BUTTON</h1>
      <p class="sub" id="sub">Press it before the boss fully wakes up.</p>
      <div class="hud">
        <div>Phase <span id="phase">1</span>/5</div>
        <div>Danger <span id="count">0</span>%</div>
      </div>
      <div class="bar" aria-hidden="true"><div class="fill" id="fill"></div></div>
      <div class="button-wrap">
        <button id="bigButton" aria-label="Boss button">ATTACK</button>
      </div>
      <div id="message" class="message" role="status" aria-live="polite"></div>
    </main>

    <script>
      const button = document.getElementById('bigButton');
      const message = document.getElementById('message');
      const title = document.getElementById('title');
      const sub = document.getElementById('sub');
      const phaseEl = document.getElementById('phase');
      const countEl = document.getElementById('count');
      const fill = document.getElementById('fill');

      const phases = [
        'The boss stirs...',
        'It is getting angry.',
        'DANGER LEVEL RISING.',
        'The ground is shaking!',
        'FINAL STRIKE!',
        'congrats'
      ];

      let hits = 0;
      const maxHits = 5;
      let audioCtx = null;

      function vibe(ms) {
        if (navigator.vibrate) navigator.vibrate(ms);
      }

      function beep(freq = 440, duration = 0.12, type = 'sine', gainValue = 0.035) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        if (!audioCtx) audioCtx = new Ctx();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = gainValue;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      }

      function playPressSound(isFinal) {
        if (isFinal) {
          beep(165, 0.18, 'square', 0.06);
          setTimeout(() => beep(196, 0.18, 'square', 0.055), 160);
          setTimeout(() => beep(220, 0.22, 'triangle', 0.05), 340);
          setTimeout(() => beep(330, 0.14, 'sine', 0.04), 560);
          setTimeout(() => beep(440, 0.22, 'triangle', 0.045), 720);
        } else {
          const tones = [740, 660, 590, 520, 460];
          const idx = Math.min(hits - 1, tones.length - 1);
          beep(tones[idx], 0.08, hits >= 4 ? 'square' : 'triangle', hits >= 4 ? 0.04 : 0.03);
          if (hits >= 3) setTimeout(() => beep(tones[idx] / 2, 0.05, 'sine', 0.018), 85);
        }
      }

      function resetAnim(el, cls) {
        el.classList.remove(cls);
        void el.offsetWidth;
        el.classList.add(cls);
        setTimeout(() => el.classList.remove(cls), 1000);
      }

      function updateUI() {
        const pct = Math.min(100, Math.round((hits / maxHits) * 100));
        phaseEl.textContent = Math.min(maxHits, hits + 1);
        countEl.textContent = pct;
        fill.style.width = pct + '%';
        message.textContent = phases[hits];
        message.classList.add('show', 'pop');
      }

      function press() {
        if (hits === 0) title.classList.add('title-hide');
        if (hits < maxHits) {
          hits += 1;
          updateUI();
          resetAnim(button, hits >= 4 ? 'shake-hard' : 'shake');
          playPressSound(false);
          vibe(hits >= 4 ? [60, 40, 60, 40, 100] : [40, 30, 40]);
          if (hits === maxHits) {
            title.textContent = 'BOSS DEFEATED';
            sub.textContent = 'Victory unlocked.';
            button.textContent = 'WIN';
            button.classList.add('victory');
            playPressSound(true);
            vibe([80, 50, 80, 50, 140]);
            setTimeout(() => {
              message.textContent = 'congrats';
              message.classList.add('show', 'pop');
            }, 250);
          }
        } else {
          hits = 0;
          title.textContent = 'BOSS BUTTON';
          sub.textContent = 'Press it before the boss fully wakes up.';
          button.textContent = 'ATTACK';
          fill.style.width = '0%';
          phaseEl.textContent = '1';
          countEl.textContent = '0';
          message.textContent = 'Round reset. Try again.';
          message.classList.add('show', 'pop');
          title.classList.remove('title-hide');
          button.classList.remove('victory');
        }
      }

      button.addEventListener('click', press);
      updateUI();
    </script>
  </body>
</html>
