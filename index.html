<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Giant Red Button</title>
    <style>
      :root { color-scheme: light; }
      html, body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(circle at top, #fffefe, #ffe8e8 60%, #ffd8d8);
        overflow: hidden;
      }
      body {
        display: grid;
        place-items: center;
        padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
        box-sizing: border-box;
      }
      .app {
        width: 100%;
        max-width: 560px;
        text-align: center;
      }
      h1 {
        margin: 0 0 18px;
        font-size: clamp(2rem, 7vw, 3.25rem);
        color: #8a0000;
        letter-spacing: 0.02em;
        transition: transform 260ms ease, opacity 260ms ease;
      }
      .button-wrap {
        display: grid;
        place-items: center;
        min-height: 56vh;
      }
      button {
        width: min(84vw, 340px);
        aspect-ratio: 1 / 1;
        border: none;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 28%, #ff9b9b 0%, #ff3a3a 28%, #dc0000 58%, #990000 100%);
        color: white;
        font-size: clamp(1.6rem, 5vw, 2.15rem);
        font-weight: 900;
        letter-spacing: 0.08em;
        box-shadow:
          0 18px 42px rgba(177, 0, 0, 0.38),
          inset 0 10px 18px rgba(255, 255, 255, 0.28),
          inset 0 -14px 22px rgba(0, 0, 0, 0.22);
        touch-action: manipulation;
        cursor: pointer;
        transform: translateZ(0);
        transition: transform 120ms ease, box-shadow 220ms ease, filter 220ms ease;
      }
      button:hover { filter: brightness(1.03); }
      button:active { transform: scale(0.965); }
      .message {
        margin-top: 18px;
        min-height: 3.3rem;
        font-size: clamp(1.55rem, 5vw, 2.3rem);
        font-weight: 800;
        color: #0b6b1d;
        opacity: 0;
        transform: translateY(16px) scale(0.96);
        transition: opacity 280ms ease, transform 280ms ease;
      }
      .message.show {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      .title-hide {
        opacity: 0;
        transform: translateY(-8px);
      }
      .pulse {
        animation: pulse 650ms ease-out;
      }
      .pop {
        animation: pop 420ms cubic-bezier(.2, .9, .2, 1.3);
      }
      @keyframes pulse {
        0% { transform: scale(1); }
        45% { transform: scale(1.06); }
        100% { transform: scale(1); }
      }
      @keyframes pop {
        0% { transform: translateY(16px) scale(0.88); }
        70% { transform: translateY(-2px) scale(1.03); }
        100% { transform: translateY(0) scale(1); }
      }
    </style>
  </head>
  <body>
    <main class="app" role="application" aria-label="Giant red button app">
      <h1 id="title">Press the Button</h1>
      <div class="button-wrap">
        <button id="bigButton" aria-label="Giant red button">BUTTON</button>
      </div>
      <div id="message" class="message" role="status" aria-live="polite">congrats</div>
    </main>

    <script>
      const button = document.getElementById('bigButton');
      const message = document.getElementById('message');
      const title = document.getElementById('title');
      let shown = false;

      function reveal() {
        if (!shown) {
          shown = true;
          title.classList.add('title-hide');
        }
        message.classList.add('show', 'pop');
        button.classList.remove('pulse');
        void button.offsetWidth;
        button.classList.add('pulse');
        if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
        setTimeout(() => button.classList.remove('pulse'), 700);
      }

      button.addEventListener('click', reveal);
    </script>
  </body>
</html>
